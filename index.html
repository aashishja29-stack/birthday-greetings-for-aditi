<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title><style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
overflow-x:hidden;
}

h1{
margin-top:40px;
font-size:42px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.photo{
width:260px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
margin:20px;
}

gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:12px;
background:white;
color:#ff4d6d;
cursor:pointer;
margin-top:25px;
}

#letter{
margin-top:30px;
font-size:22px;
max-width:700px;
margins-left:auto;
margins-right:auto;
border-right:3px solid white;
white-space:pre-wrap;
overflow:hidden;
}

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}
</style></head><body><div class="container"><h1>Happy Birthday My Love 🎂❤️</h1><p>You make my life brighter every day.</p><div class="gallery">
<img src="photo1.jpg" class="photo">
<img src="photo2.jpg" class="photo">
<img src="photo3.jpg" class="photo">
</div><button onclick="startLetter()">Open My Love Letter 💌</button>

<p id="letter"></p></div><audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio><script>

const text = "Happy Birthday my love. From the moment you came into my life everything became brighter and happier. Your smile makes my day better and your presence makes my world complete. I am so lucky to have you. I hope this birthday is as beautiful and special as you are. ❤️";

let i = 0;

function startLetter(){
let speed = 40;

function typeWriter(){
if(i < text.length){
document.getElementById("letter").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter, speed);
}
}

typeWriter();
}

function createHeart(){
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "❤️";
heart.style.left = Math.random()*100 + "vw";
heart.style.animationDuration = (Math.random()*3+3)+"s";

 document.body.appendChild(heart);

 setTimeout(()=>{
 heart.remove();
 },6000);
}

setInterval(createHeart,300);

</script></body>
</html>
